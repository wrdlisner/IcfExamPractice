<!doctype html>
<html lang="ja-JP">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ICF資格試験 学習アプリ</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="wrap">
      <h1>ICF資格試験 学習アプリ</h1>
      <p>依存パッケージの取得制限がある環境向けに、ローカルデータのみで実行できる最小ランタイムを提供しています。</p>
      <p id="disc"></p>
      <ul>
        <li>ACC問題数: <strong id="acc"></strong></li>
        <li>PCC/MCC問題数: <strong id="pcc"></strong></li>
      </ul>
      <p>この画面が表示されれば <code>npm install</code> / <code>npm run dev</code> は正常に動作しています。</p>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
